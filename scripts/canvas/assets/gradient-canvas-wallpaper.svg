    <circle cx="260" cy="688" r="16" fill="#ffffff"/>
    <circle cx="492" cy="570" r="14" fill="#F5C842"/>
    <circle cx="706" cy="684" r="14" fill="#D63CA0"/>
    <circle cx="960" cy="590" r="16" fill="#ffffff"/>
    <circle cx="1180" cy="700" r="14" fill="#F5C842"/>
    <circle cx="1466" cy="612" r="18" fill="#D63CA0"/>
