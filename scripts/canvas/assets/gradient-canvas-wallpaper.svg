  <g fill="none" stroke="#ffffff" stroke-opacity="0.36" stroke-width="3">
    <path d="M196 282L456 172L692 286L848 178L1106 286L1378 140L1660 262"/>
    <path d="M260 688L492 570L706 684L960 590L1180 700L1466 612L1708 734"/>
    <path d="M342 226L346 642L654 358L662 842L944 486L956 910L1264 552L1268 908L1558 730"/>
  </g>
  <g>
