<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title>Gradient Linux Canvas wallpaper</title>
  <desc>Warm geometric wallpaper based on the concave-web palette.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcf7ef"/>
      <stop offset="45%" stop-color="#f8ebfb"/>
      <stop offset="100%" stop-color="#fff4d1"/>
    </linearGradient>
    <linearGradient id="meshA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B00A0" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#D63CA0" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="meshB" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#D63CA0" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1480" cy="180" r="230" fill="#F5C842" opacity="0.35" filter="url(#blur)"/>
  <circle cx="330" cy="870" r="280" fill="#D63CA0" opacity="0.18" filter="url(#blur)"/>
